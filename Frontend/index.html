<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Phone Damage Detector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 { font-size: 2rem; margin-bottom: 8px; color: #ff6b35; }
    p.subtitle { color: #aaa; margin-bottom: 40px; }

    .container {
      display: flex;
      gap: 30px;
      width: 100%;
      max-width: 1000px;
      flex-wrap: wrap;
    }
    .card {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 24px;
      flex: 1;
      min-width: 300px;
    }
    .card h2 { font-size: 1rem; color: #aaa; margin-bottom: 16px; }

    .upload-area {
      border: 2px dashed #333;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .upload-area:hover { border-color: #ff6b35; }
    .upload-area img { max-width: 100%; border-radius: 8px; }

    #fileInput { display: none; }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 12px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-submit { background: #ff6b35; color: #fff; }
    .btn-clear { background: #333; color: #fff; }

    .result-img { max-width: 100%; border-radius: 8px; display: none; }
    .summary { margin-top: 16px; }
    .damage-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: #252525;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: bold;
    }
    .high { background: #ff3b3b33; color: #ff3b3b; }
    .medium { background: #ff6b3533; color: #ff6b35; }
    .low { background: #ffcc0033; color: #ffcc00; }
    .loading { color: #aaa; text-align: center; padding: 20px; display: none; }
  </style>
</head>
<body>

  <h1>📱 Phone Damage Detector</h1>
  <p class="subtitle">Upload a phone image to detect scratches, dead pixels, or cracks</p>

  <div class="container">
    <!-- Upload Card -->
    <div class="card">
      <h2>UPLOAD IMAGE</h2>
      <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <img id="previewImg" src="" alt="" style="display:none"/>
        <div id="uploadPlaceholder">
          <p style="font-size:2rem">📤</p>
          <p>Click to upload or drag & drop</p>
          <p style="color:#666; font-size:0.85rem">JPG, PNG supported</p>
        </div>
      </div>
      <input type="file" id="fileInput" accept="image/*" onchange="previewImage(event)" />
      <button class="btn btn-submit" onclick="submitImage()">🔍 Analyze Damage</button>
      <button class="btn btn-clear" onclick="clearAll()">✕ Clear</button>
    </div>

    <!-- Result Card -->
    <div class="card">
      <h2>DETECTION RESULT</h2>
      <div class="loading" id="loading">⏳ Analyzing image...</div>
      <img id="resultImg" class="result-img" />
      <div class="summary" id="summary"></div>
    </div>
  </div>

  <script>
    // 🔁 Replace this with your Render backend URL
    const API_URL = "https://phone-damage-detector.onrender.com";

    let selectedFile = null;

    function previewImage(event) {
      selectedFile = event.target.files[0];
      const reader = new FileReader();
      reader.onload = (e) => {
        document.getElementById('previewImg').src = e.target.result;
        document.getElementById('previewImg').style.display = 'block';
        document.getElementById('uploadPlaceholder').style.display = 'none';
      };
      reader.readAsDataURL(selectedFile);
    }

    async function submitImage() {
      if (!selectedFile) return alert("Please upload an image first!");

      document.getElementById('loading').style.display = 'block';
      document.getElementById('resultImg').style.display = 'none';
      document.getElementById('summary').innerHTML = '';

      const formData = new FormData();
      formData.append('file', selectedFile);

      try {
        const res = await fetch(API_URL, { method: 'POST', body: formData });
        const data = await res.json();

        // Show result image
        const resultImg = document.getElementById('resultImg');
        resultImg.src = `data:image/jpeg;base64,${data.image}`;
        resultImg.style.display = 'block';

        // Show damage summary
        const summary = document.getElementById('summary');
        summary.innerHTML = '<h2 style="color:#aaa;font-size:1rem;margin-bottom:12px">DAMAGE SUMMARY</h2>';
        data.detections.forEach(d => {
          const level = d.confidence > 75 ? 'high' : d.confidence > 50 ? 'medium' : 'low';
          summary.innerHTML += `
            <div class="damage-item">
              <span>${d.label}</span>
              <span class="badge ${level}">${d.confidence}% confidence</span>
            </div>`;
        });
        if (data.detections.length === 0) {
          summary.innerHTML += '<p style="color:#aaa">No damage detected.</p>';
        }

      } catch (err) {
        alert("Error connecting to server. Is your backend running?");
      }

      document.getElementById('loading').style.display = 'none';
    }

    function clearAll() {
      selectedFile = null;
      document.getElementById('previewImg').style.display = 'none';
      document.getElementById('uploadPlaceholder').style.display = 'block';
      document.getElementById('resultImg').style.display = 'none';
      document.getElementById('summary').innerHTML = '';
      document.getElementById('fileInput').value = '';
    }
  </script>
</body>
</html>
